<html>
<head>
<style>

body {
  overflow: hidden; /* Hide scrollbars */
}

* {
  margin-top: 0.3em;
}
.statement {
  color: red;
  font-weight: bold;
  font-style: italic;
}

#output_div {
  border:none;
}

#output_text {
  width:100%;
  height:65%;
  resize: none;
  overflow-y: scroll;
}
</style>
  <meta http-equiv="Content-Type" content="text/plain; charset=utf-16">
</head>
<body>
    <label>Command to run: <textarea style="vertical-align: middle; width:80%; height:10%" id="cmd" placeholder='Enter command and click "Run".'></textarea></label>
    <br>
    <input type="button" id="run_cmd" value="Run"/>
    <label><input type="radio" id="as_js" name="run_as" value="JS" checked/>As javascript</label>
    <label><input type="radio" id="as_sh" name="run_as" value="shell" />As shell</label>
    <label style="float:right;">Shell running timeout: <input type="number" id="tout" value="3000" min="0" style="width:48px" step="100"/> milliseconds</label>
    <div id="output_div">
      <textarea readonly id="output_text"></textarea>
      <span id="tout_warn" class="statement">&nbsp;</span>
    </div>
    <input type="button" id="output_clear" value="Clean output" onclick="output_text.value=''; tout_warn.innerHTML='&nbsp;'"/>
    <br>
</body>
<script>
if (typeof webapp_title === "function") {
  webapp_size(640, 384, 0);
  //window.webapp_get_title().then(result => { console.log(result.value); });
  //window.ls("..").then(result => { console.log(result.value); });
/*
  file_status("x64");
  file_status("webview-app.exe");
  file_status("win.cpp");
  file_status("NUL");
  file_status("NotFound");
  file_status("runopt.o");
*/
 dir();
}

cmd.focus();

const file_type = {
  not_found: -1,      none: 0, regular: 1, directory: 2, symlink: 3,
      block:  4, character: 5,    fifo: 6,    socket: 7, unknown: 8
};

function ftype2s(t) {
  switch (t) {
    case file_type.none:
      return "`not-evaluated-yet`";
    case file_type.not_found:
      return "not found";
    case file_type.regular:
      return "regular file";
    case file_type.directory:
      return "directory";
    case file_type.symlink:
      return "symlink";
    case file_type.block:
      return "block device";
    case file_type.character:
      return "character device";
    case file_type.fifo:
      return "named IPC pipe";
    case file_type.socket:
      return "named IPC socket";
    case file_type.unknown:
      return "`unknown`";
    default:
      return "`implementation-defined`";
  }
}

const perms = {
        none:      0,
 others_exec:     01, others_write:    02, others_read:    04, others_all:    07,
  group_exec:    010,  group_write:   020,  group_read:   040,  group_all:   070,
  owner_exec:   0100,  owner_write:  0200,  owner_read:  0400,  owner_all:  0700,
         all:   0777,
  sticky_bit:  01000,      set_gid: 02000,     set_uid: 04000,       mask: 07777,
     unknown: 0xFFFF
};

function perm2s(p) {
  sp="";
  if (p === perms.unknown)			sp+="unknown,";
  else {
    if (p&perms.all)			        sp+="all,";
    else {
      if (p&perms.none)			      sp+="none,";
      if (p&perms.others_all)			sp+="others_all,";
      else {
        if (p&perms.others_exec)	sp+="others_exec,";
        if (p&perms.others_write)	sp+="others_write,";
        if (p&perms.others_read)	sp+="others_read,";
      }

      if (p&perms.group_all)		 sp+="group_all,";
      else {
        if (p&perms.group_exec)	 sp+="group_exec,";
        if (p&perms.group_write) sp+="group_write,";
        if (p&perms.group_read)	 sp+="group_read,";
      }

      if (p&perms.owner_all)		 sp+="owner_all,";
      else {
        if (p&perms.owner_exec)	 sp+="owner_exec,";
        if (p&perms.owner_write) sp+="owner_write,";
        if (p&perms.owner_read)	 sp+="owner_read,";
      }
    }


    if (p&perms.mask)			        sp+="mask,";
    else {
      if (p&perms.sticky_bit)			sp+="sticky_bit,";
      if (p&perms.set_gid)			  sp+="set_gid,";
      if (p&perms.set_uid)			  sp+="set_uid,";
    }
  }
  
  // Remove last comma
  sp=sp.slice(0, -1)
  return sp;
}

function show_status(fsta) {
  function prm(op, p) { return fsta.perms & p ? op : '-'; }
  function typ(op, p) { return fsta.perms & p ? op : '-'; }

  ret="";
  if (fsta.type === file_type.not_found) ret="          ";
  else {
    ret+=fsta.type === file_type.directory ? 'd':'-';
    ret+=prm('r', perms.owner_read);
    ret+=prm('w', perms.owner_write);
    ret+=prm('x', perms.owner_exec);
    ret+=prm('r', perms.group_read);
    ret+=prm('w', perms.group_write);
    ret+=prm('x', perms.group_exec);
    ret+=prm('r', perms.others_read);
    ret+=prm('w', perms.others_write);
    ret+=prm('x', perms.others_exec);
  }

  return ret;
}

function end_cmd() {
  output_text.scrollTop=output_text.scrollHeight;
  run_cmd.disabled=false;
  cmd.focus();
}

function file_status(f, obj) {
  fstat(f).then(r => {
    f=f.replace(/^\.\//, "");
    res=show_status(r)+' '+f;
    obj.value+=res+"\n";
    r1=27-f.length;
    if (r1 < 1) r1=1;
    r2=7-+r.perms.toString(8).length;
    if (r2 < 1) r2=1;
    console.log(res);
  });
}

// dir()
function dir(fld=".", rec=false) {
  if (rec) l=lsr(fld);
  else l=ls(fld);
  var nfiles=0, ndir=0, nothers=0;

  l.then(r=>{
     r.forEach(f=> {
      file_status(f, output_text);
    });

    output_text.value+=r.length+" file";
    if (r.length > 1) output_text.value+='s';
    output_text.value+="\n";
    end_cmd();
  });
}


function exec_cmd_no_return(cmd_value, duration) {
  if (run_cmd.disabled === true) {
    tout_warn.innerHTML='Command ['+cmd_value+'] did not return after '+duration/1000+' seconds.';
    run_cmd.disabled=false;
  } else tout_warn.innerHTML='&nbsp;';

  cmd.focus();
}

function exec_cmd(cmd_value) {
    run_cmd.disabled = true;
    cmd_value=cmd_value.trim();
    tout_warn.innerHTML='&nbsp;';
    setTimeout(exec_cmd_no_return, tout.value, cmd_value, tout.value);
    window.webapp_exec(cmd_value, true).then(result => {
      output_text.value += result.value;//.replace(/(?:\r\n|\r|\n)/g, '<br/>');
      end_cmd();
    });
}

run_cmd.addEventListener( "click", (event) => { // Sur click "Run" on execute la commande comme shell ou javascript
  if (cmd.value !== "") {
    run_cmd.disabled = true;
    cmd.value=cmd.value.trim();

    if (as_js.checked) {
      eval(cmd.value);
      end_cmd();
    } else exec_cmd(cmd.value);
  }

  cmd.focus();
});

  document.addEventListener("keyup", (event) => { if (event.keyCode === 27) { webapp_exit(); } });
</script>
<html>
