<html>
  <head>
    <meta http-equiv="Content-Type" content="text/plain; charset=utf-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script type="text/javascript" src="msgbox.js"></script>
    <script type="text/javascript" src="util.js"></script>
    <script type="text/javascript" src="time.js"></script>
    <script type="text/javascript" src="filesystem.js"></script>
    <script type="text/javascript" src="head.js"></script>
  </head>
  <body>
    <div class="topnav">
      <a onclick="conf_save_and_exit()">Quit</a>
      <a onclick="getwinrec()" >WindRec</a>
      <a onclick="about()" >About</a>
    </div>
    <div id="dv1">
      <label>Command to run:</label>
      <textarea style="" id="cmd" placeholder='Enter command and click "Run".'></textarea>
    </div>

    <div id="dv2">
    <input type="button" id="run_cmd" value="Run" />
    <label>
      <input type="radio" id="as_js" name="run_as" value="JS" checked />As javascript
    </label>
    <label>
      <input type="radio" id="as_sh" name="run_as" value="shell" />As shell
    </label>
    <span id="dv2_1">
    <label>Shell running timeout:
      <input type="number" id="tout" value="3000" min="0" style="width:50px; padding-right:0px; padding-left:0px;" step="100" />
      ms
    </label>
    </span>
    <input  type="button" id="output_clear" value="Clean output" onclick="output.value=''; tout_warn.innerHTML='&nbsp;'" />
    </div>

    <div id="dv3">
      <textarea id="output" placeholder="My name is output"></textarea>
      <span id="tout_warn">&nbsp;</span>
    </div>
    <br>
  </body>
    <script type="text/javascript" src="body.js"></script>
<html>
