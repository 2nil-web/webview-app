<html>
  <head>
    <meta http-equiv="Content-Type" content="text/plain; charset=utf-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script type="text/javascript" src="time.js"></script>
    <script type="text/javascript" src="promise.js"></script>
    <script type="text/javascript" src="filesystem.js"></script>
    <script type="text/javascript" src="head.js"></script>
  </head>
  <body>
    <div id="dv1">
      <label>Command to run:</label>
      <textarea style="" id="cmd" placeholder='Enter command and click "Run".'></textarea>
    </div>

    <div id="dv2">
    <input type="button" id="run_cmd" value="Run" />
    <label>
      <input type="radio" id="as_js" name="run_as" value="JS" checked />As javascript
    </label>
    <label>
      <input type="radio" id="as_sh" name="run_as" value="shell" />As shell
    </label>
    <label style="float:right;">Shell running timeout:
      <input type="number" id="tout" value="3000" min="0" style="width:54px" step="100" />
      milliseconds
    </label>
    </div>

    <div id="dv3">
      <textarea readonly id="output_text" placeholder="hello my name is output_text"></textarea>
      <span id="tout_warn">&nbsp;</span>
    </div>
    <input type="button" id="output_clear" value="Clean output" onclick="output_text.value=''; tout_warn.innerHTML='&nbsp;'" />
    <br>
  </body>
    <script type="text/javascript" src="body.js"></script>
<html>
