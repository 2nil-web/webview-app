<html>
  <head>
<style>
body {
  overflow: hidden; /* Hide scrollbars */
}
.statement {
  color: red;
  font-weight: bold;
  font-style: italic;
}

#output_par {
  //white-space: pre-line;
  width:95%;
  height:75%;
  border:1px solid black;
}

#output_text {
  //white-space: pre-line;
  width:100%;
  height:100%;
  resize: none;
  overflow-y: scroll;
  border:0px solid white;
}

</style>
    <meta http-equiv="Content-Type" content="text/plain; charset=utf-16">
  </head>
    <label>Command to run:
      <textarea style="vertical-align: top;" rows="2" cols="40" id="cmd" placeholder='Enter command and click "Run".'></textarea>
    </label>
    <input type="button" id="run_cmd" value="Run"/>
    <input type="number" id="tout" value="3000" min="0" style="width:50" step="100"/>
    <br> <input type="button" id="output_clear" value="Clean output" onclick="output_text.innerText=''"/>
    <br><br>
    <div id="output_par"><textarea readonly id="output_text"></textarea></div>
    <br><br>
    <!--input type="button" id="quit" value="Exit web app" onclick="webapp_exit()"--!>
  <script>
//typeof webapp_title === "function"
    if (typeof webapp_title === "function") {
        window.webapp_get_title().then(result => { console.log(result.value); });
      webapp_size(640, 384, 0);
    }
    cmd.focus();

    function exec_cmd_no_return(scmd, duration) {
      if (run_cmd.disabled === true) {
        output_par.innerHTML+='<span class="statement">Command ['+scmd+'] did not return anything after '+duration/1000+' seconds.<br/></span>';
        run_cmd.disabled=false;
      }
      document.getElementById("cmd").focus();
    }

    function exec_cmd(scmd) {
      if (scmd !== "") {
        run_cmd.disabled = true;
        scmd=scmd.trim();
        //console.log('[' + scmd + ']');
        setTimeout(exec_cmd_no_return, tout.value, scmd, tout.value);
        window.webapp_exec(scmd, true).then(result => {
          output_text.value += result.value;//.replace(/(?:\r\n|\r|\n)/g, '<br/>');
          scroll_to_bottom("output_text");
          run_cmd.disabled = false;
          cmd.focus();
        });
      }
    }

    function getCurrentLine(objName, curr=true) {
      ta=document.getElementById(objName);
      ssta=ta.selectionStart;
      sfin=ta.selectionEnd;

      if (ssta !== sfin) {
        ret=ta.value.substring(ssta, sfin);
        //console.log("ssta !== sfin (" + ssta + "," + sfin + ") ==>[" + ret + "]");
        return ret.trim();
      }

      // Get current line
      var is, ie;
      for (is=ssta; is; is--) {
        if (is !== ssta && (ta.value.charCodeAt(is) == 10 || ta.value.charCodeAt(is) == 13)) break;
      }

      for (ie=sfin; ie < ta.value.length; ie++) {
        if (ie !== sfin && (ta.value.charCodeAt(ie) == 10 || ta.value.charCodeAt(ie) == 13)) break;
      }
      currLine=ta.value.substring(is, ie).trim();

      // Get previous line
      for (iss=is - 1; iss > 0; iss--) {
        if (ta.value.charCodeAt(iss) == 10 || ta.value.charCodeAt(iss) == 13) break;
      }
      prevLine=ta.value.substring(iss, is).trim();

      //console.log("ssta === sfin (" + sfin + ")");
      //ta.value=ta.value.trimRight()+'\n';
      if (prevLine === "" || curr) return currLine;
      else return prevLine;
    }

    function getPreviousLine(objName) {
      return getCurrentLine(objName, false);
    }

    function scroll_to_bottom(objName) {
      var logTa=document.getElementById(objName)
      logTa.scrollTop=logTa.scrollHeight;
    }
    
    document.addEventListener("DOMContentLoaded", () => {
      cmd.addEventListener("keyup", (event) => { // Sur CR on execute la ligne précédente
        if (event.keyCode === 13) exec_cmd(getPreviousLine("cmd"));
      });
    
      run_cmd.addEventListener( "click", (event) => { // Sur click "Run" on execute la ligne courante
        exec_cmd(getCurrentLine("cmd"));
      });
    
    document.addEventListener("keyup", (event) => { if (event.keyCode === 27) {
        webapp_exit();
      }
    });
    });
  </script>
<html>
