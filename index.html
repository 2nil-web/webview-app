<html>
<head>
<style>

body {
  overflow: hidden; /* Hide scrollbars */
}

* {
  margin-top: 0.3em;
}
.statement {
  color: red;
  font-weight: bold;
  font-style: italic;
}

#output_div {
  border:none;
}

#output_text {
  width:100%;
  height:65%;
  resize: none;
  overflow-y: scroll;
}
</style>
  <meta http-equiv="Content-Type" content="text/plain; charset=utf-16">
</head>
<body>
    <label>Command to run: <textarea style="vertical-align: middle; width:80%; height:10%" id="cmd" placeholder='Enter command and click "Run".'></textarea></label>
    <br>
    <input type="checkbox" id="curr_line" checked /> <label for="curr_line">Run current line only</label>
    <input type="button" id="run_cmd" value="Run as shell"/>
    <input type="button" id="run_js" value="Run as js"/>
    <br>
    <label>Wait to abort command after: <input type="number" id="tout" value="3000" min="0" style="width:48px" step="100"/> milliseconds</label>
    <div id="output_div"><textarea readonly id="output_text"></textarea></div>
    <input type="button" id="output_clear" value="Clean output" onclick="document.getElementById('output_text').value=''"/>
    <br>
    <!--input type="button" id="quit" value="Exit web app" onclick="webapp_exit()"--!>
</body>
<script>
//typeof webapp_title === "function"

//    if (typeof webapp_title === "function") {
      webapp_size(640, 384, 0);
      //window.webapp_get_title().then(result => { console.log(result.value); });
      //window.ls("..").then(result => { console.log(result.value); });
//      ls().then(result => { console.log(result.value); });
//    }

    cmd.focus();

    function exec_cmd_no_return(scmd, duration) {
      if (run_cmd.disabled === true) {
        output_div.innerHTML='<span class="statement">Command ['+scmd+'] did not return anything after '+duration/1000+' seconds.<br/></span>'+output_div.innerHTML;
        run_cmd.disabled=false;
      }
      document.getElementById("cmd").focus();
    }

    function exec_cmd(scmd) {
      if (scmd !== "") {
        run_cmd.disabled = true;
        run_js.disabled = true;
        scmd=scmd.trim();
        setTimeout(exec_cmd_no_return, tout.value, scmd, tout.value);
        window.webapp_exec(scmd, true).then(result => {
          output_text.value += result.value;//.replace(/(?:\r\n|\r|\n)/g, '<br/>');
          scroll_to_bottom("output_text");
          run_cmd.disabled = false;
          run_js.disabled = false;
          cmd.focus();
        });
      }
    }

    function exec_js(scmd) {
      if (scmd !== "") {
        run_cmd.disabled = true;
        run_js.disabled = true;
        scmd=scmd.trim();
        eval(scmd);
        scroll_to_bottom("output_text");
        run_cmd.disabled = false;
        run_js.disabled = false;
        cmd.focus();
      }
    }

    function getLine(objName, curr=true) {
      ta=document.getElementById(objName);
      ssta=ta.selectionStart;
      sfin=ta.selectionEnd;

      if (ssta !== sfin) {
        ret=ta.value.substring(ssta, sfin);
        return ret.trim();
      }

      // Get current line
      var is, ie;
      for (is=ssta; is; is--) {
        if (is !== ssta && (ta.value.charCodeAt(is) == 10 || ta.value.charCodeAt(is) == 13)) break;
      }

      for (ie=sfin; ie < ta.value.length; ie++) {
        if (ie !== sfin && (ta.value.charCodeAt(ie) == 10 || ta.value.charCodeAt(ie) == 13)) break;
      }
      currLine=ta.value.substring(is, ie).trim();

      // Get previous line
      for (iss=is - 1; iss > 0; iss--) {
        if (ta.value.charCodeAt(iss) == 10 || ta.value.charCodeAt(iss) == 13) break;
      }
      prevLine=ta.value.substring(iss, is).trim();

      if (prevLine === "" || curr) return currLine;
      else return prevLine;
    }

    function getPreviousLine(objName) {
      return getLine(objName, false);
    }

    function scroll_to_bottom(objName) {
      var logTa=document.getElementById(objName)
      logTa.scrollTop=logTa.scrollHeight;
    }
    
    document.addEventListener("DOMContentLoaded", () => {
      cmd.addEventListener("keyup", (event) => { // Sur CR on execute la ligne précédente
          if (event.keyCode === 13) {
            if (curr_line.checked) exec_cmd(getPreviousLine("cmd"));
            else exec_cmd(cmd.value);
          }
      });
    
      run_cmd.addEventListener( "click", (event) => { // Sur click "Run as shell" on execute la ligne courante
        if (curr_line.checked) exec_cmd(getPreviousLine("cmd"));
        else exec_cmd(cmd.value);
      });
    
      run_js.addEventListener( "click", (event) => { // Sur click "Run as shell" on execute la ligne courante
        if (curr_line.checked) exec_js(getPreviousLine("cmd"));
        else exec_js(cmd.value);
      });
    
    document.addEventListener("keyup", (event) => { if (event.keyCode === 27) {
        webapp_exit();
      }
    });
    });
</script>
<html>
