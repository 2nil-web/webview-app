<html>
<head>
</head>
<label> Command to run: <textarea style="vertical-align: top;" rows="1" cols="44" id="cmd" value="" placeholder='Enter your command and click the "Run" button.'></textarea></label>
<input type="button" id="run_cmd" name="run_cmd" value="Run">
<br><br>
<textarea style="width:95%; height:85%" id="output" name="output"></textarea>
<br><br>
<!--input type="button" id="quit" name="quit" value="Exit web app" onclick="webapp_exit()"--!>
<script>
  /*
if (typeof webapp_title === "function") {
  webapp_title("Hello");
  webapp_size(1000, 800, 0);
}
*/
document.addEventListener("DOMContentLoaded", () => {
  run_cmd.addEventListener("click", (event) => {
    run_cmd.disabled = true;
    window.webapp_exec(cmd.value).then(result => {
      output.textContent += result.value;
      run_cmd.disabled = false;
    });
  });

  document.addEventListener("keyup", (event) => {
    if (event.keyCode === 27) webapp_exit();
  });
});
</script>
<html>
