<html>
  <head>
    <meta http-equiv="Content-Type" content="text/plain; charset=utf-16">
    <script>
function start_timer() {
  setInterval(() => { time.textContent=new Date().toUTCString(); } , 400);
}
    </script>
  </head>
  <body onload="start_timer()">
    <div id="time"></div>
    <div id="dv"></div>
  </body>
    <script>
var tochg="Unchanged";

function promise_run () {
  tochg="Before resolve";
  setTimeout(() => promise_resolv("done"), 4000);
  tochg="After resolve";
}

// affiche "done!" après 1 seconde
function promise_resolv (result) {
  dv.insertAdjacentHTML("beforeend", "Promesse résolue "+result+"="+tochg+"<br>");
}

 // ne se lance pas
function promise_reject (error) {
  dv.insertAdjacentHTML("beforeend", "ERREUR "+error+"="+tochg+"<br>");
}

function promise_test () {
  dv.insertAdjacentHTML("beforeend", "Avant lancement promesse "+tochg+"<br>");

  let promise = new Promise(function(resolve, reject) {
    dv.insertAdjacentHTML("beforeend", "Début lancement promesse "+tochg+"<br>");
    promise_run();
    dv.insertAdjacentHTML("beforeend", "Fin lancement promesse "+tochg+"<br>");
  });

  dv.insertAdjacentHTML("beforeend", "Aprés lancement promesse "+tochg+"<br>");

  // resolve lance la première fonction dans .then
  promise.then( result => promise_resolv(result), error => promise_reject(error));
}

promise_test();
  </script>

<html>
